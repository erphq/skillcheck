# Batch dev-dependency updates monthly so alert noise has a real
# floor. Runtime dependency PRs still come in individually because
# they affect every consumer of the package.

version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    labels:
      - "automated"
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "13:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 3
    labels:
      - "automated"
      - "ci"
    commit-message:
      prefix: "ci(deps)"
      include: "scope"
